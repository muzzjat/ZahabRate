<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE</title>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ccc; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>أسعار الذهب (Retail)</h2>
        <table border="1" style="width:100%; text-align:center;">
            <tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr>
            <tr><td>325</td><td>302</td><td>288</td><td>248</td></tr>
        </table>
    </div>

    <div class="card">
        <h2>حاسبة الذهب</h2>
        <input type="number" id="grams" value="1" placeholder="الوزن">
        <select id="tax">
            <option value="0">0%</option>
            <option value="0.05">5%</option>
        </select>
        <button onclick="calculate()">احسب الآن</button>
        <h3 id="result">الإجمالي: 0.00</h3>
    </div>

    <script>
        function calculate() {
            let g = document.getElementById('grams').value;
            let t = document.getElementById('tax').value;
            let price = 325; // سعر ثابت للتجربة
            let total = (price * g) * (1 + parseFloat(t));
            document.getElementById('result').innerText = "الإجمالي: " + total.toFixed(2);
            alert("الحسبة: " + total);
        }
    </script>
</body>
</html>
