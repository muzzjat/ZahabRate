<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #333333; color: #FFFDD0; display: flex; margin: 0; padding: 20px; }
        .sidebar { width: 220px; padding: 20px; background: #212121; border-radius: 15px; margin-left: 20px; height: fit-content; }
        .sidebar a { display: block; color: #FFFDD0; text-decoration: none; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 5px; cursor: pointer; }
        .main-content { flex: 1; }
        .time-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #212121; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 15px; border-radius: 15px; color: white; margin-bottom: 20px; }
        /* تصحيح تداخل الجدول */
        .gold-market { background: #d4af37; color: black; }
        .gold-market table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .gold-market th, .gold-market td { padding: 5px; border: 1px solid black; font-size: 0.9em; text-align: center; }
        .gold-calc { background: #2c3e50; } .zakat { background: #27ae60; } .crypto { background: #c0392b; }
        .calc-screen { background: #000; color: #0f0; padding: 10px; text-align: center; font-size: 1.3em; border-radius: 5px; margin-bottom: 10px; font-weight: bold; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <a data-i18n="about">من نحن</a>
    <a data-i18n="privacy">سياسة الخصوصية</a>
    <a data-i18n="disclaimer">إخلاء المسؤولية</a>
    <a data-i18n="contact">اتصل بنا</a>
</div>

<div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <img src="logo.png.png" style="height: 100px;">
        <select id="lang" onchange="changeLang()">
            <option value="ar">🇸🇦 العربية</option><option value="en">🇺🇸 English</option><option value="fr">🇫🇷 Français</option>
            <option value="hi">🇮🇳 हिन्दी</option><option value="ru">🇷🇺 Русский</option><option value="ur">🇵🇰 اردو</option>
            <option value="tr">🇹🇷 Türkçe</option><option value="uk">🇺🇦 Українська</option><option value="es">🇪🇸 Español</option><option value="zh">🇨🇳 中文</option>
        </select>
    </div>

    <div class="time-bar">
        <div><span data-i18n="dubai">دبي</span><span id="time-dubai" style="display:block;">--:--:--</span></div>
        <div><span data-i18n="london">لندن</span><span id="time-london" style="display:block;">--:--:--</span></div>
        <div><span data-i18n="ny">نيويورك</span><span id="time-ny" style="display:block;">--:--:--</span></div>
    </div>

    <div class="grid">
        <div class="card gold-market">
            <h2 data-i18n="gold_market">أسعار الذهب</h2>
            <table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>325</td><td>302</td><td>288</td><td>248</td></tr></table>
        </div>
        
        <div class="card gold-calc">
            <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
            <div class="calc-screen" id="finalPrice">0.00 AED</div>
            <div class="calc-grid">
                <select id="kSelect" onchange="calc()"><option value="325">24K</option><option value="302">22K</option><option value="288">21K</option><option value="248">18K</option><option value="190">14K</option></select>
                <input type="number" id="grams" data-i18n-placeholder="weight" placeholder="الوزن" oninput="calc()">
                <select id="labor" onchange="calc()"></select><select id="tax" onchange="calc()"></select>
            </div>
        </div>

        <div class="card crypto">
            <h2 data-i18n="crypto_calc">حاسبة العملات الرقمية</h2>
            <div class="calc-screen" id="cryptoResult">0.00</div>
            <div class="calc-grid">
                <input type="number" id="cryptoAmount" data-i18n-placeholder="coin_count" placeholder="عدد العملة" oninput="calcCrypto()">
                <select id="cryptoSelect" onchange="calcCrypto()"></select>
                <select id="currencyTarget" onchange="calcCrypto()" style="grid-column:span 2;">
                    <option value="1">USD</option><option value="3.67">AED</option><option value="3.75">SAR</option>
                    <option value="0.92">EUR</option><option value="48.5">EGP</option><option value="0.30">KWD</option>
                    <option value="0.38">OMR</option><option value="83.5">INR</option><option value="56.5">PHP</option>
                </select>
            </div>
        </div>

        <div class="card zakat">
            <h2 data-i18n="zakat_calc">حاسبة زكاة الذهب</h2>
            <div class="calc-screen" id="zakatResult">0.00</div>
            <div class="calc-grid">
                <select id="zakatKarat" onchange="calcZakat()"><option value="24">24K</option></select>
                <input type="number" id="zakatGrams" data-i18n-placeholder="weight" placeholder="الوزن" oninput="calcZakat()">
            </div>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: { gold_market: 'أسعار الذهب تجزئة "دبى"', gold_calc: 'حاسبة الذهب', crypto_calc: 'حاسبة العملات الرقمية', zakat_calc: 'حاسبة زكاة الذهب', weight: 'الوزن', coin_count: 'عدد العملة', dubai: 'دبي', london: 'لندن', ny: 'نيويورك', about: 'من نحن', privacy: 'سياسة الخصوصية', disclaimer: 'إخلاء المسؤولية', contact: 'اتصل بنا' },
        en: { gold_market: 'Dubai Gold Price', gold_calc: 'Gold Calc', crypto_calc: 'Crypto Calc', zakat_calc: 'Zakat Calc', weight: 'Weight', coin_count: 'Coin Count', dubai: 'Dubai', london: 'London', ny: 'New York', about: 'About', privacy: 'Privacy', disclaimer: 'Disclaimer', contact: 'Contact' }
        // (يمكنك إكمال باقي اللغات هنا بنفس النسق)
    };

    function changeLang() {
        const l = document.getElementById('lang').value;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            if(translations[l] && translations[l][el.dataset.i18n]) el.innerText = translations[l][el.dataset.i18n];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            if(translations[l] && translations[l][el.dataset.i18n_placeholder]) el.placeholder = translations[l][el.dataset.i18n_placeholder];
        });
        // تغيير اتجاه الصفحة
        document.getElementById('htmlTag').dir = (l === 'ar' || l === 'ur') ? 'rtl' : 'ltr';
    }

    // تهيئة القوائم
    const coins = [{name:"Bitcoin",val:65000}, {name:"Ethereum",val:3500}, {name:"USDT",val:1}, {name:"XRP",val:0.5}];
    coins.forEach(c => document.getElementById('cryptoSelect').innerHTML += `<option value="${c.val}">${c.name}</option>`);
    for(let i=0; i<=70; i+=5) document.getElementById('labor').innerHTML += `<option value="${i/100}">${i}% مصنعية</option>`;
    for(let i=0; i<=50; i+=5) document.getElementById('tax').innerHTML += `<option value="${i/100}">${i}% ضريبة</option>`;

    // الدوال
    function calc() {
        let p = parseFloat(document.getElementById('kSelect').value);
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }
    function calcCrypto() {
        let r = (parseFloat(document.getElementById('cryptoAmount').value) || 0) * (parseFloat(document.getElementById('cryptoSelect').value) || 0) * (parseFloat(document.getElementById('currencyTarget').value) || 1);
        document.getElementById('cryptoResult').innerText = r.toFixed(2);
    }
    function calcZakat() {
        let g = parseFloat(document.getElementById('zakatGrams').value) || 0;
        document.getElementById('zakatResult').innerText = g >= 85 ? ((g * 325) * 0.025).toFixed(2) + " AED" : "---";
    }
    setInterval(() => {
        ['Asia/Dubai', 'Europe/London', 'America/New_York'].forEach((tz, i) => {
            document.querySelectorAll('.time-bar span')[i+3].innerText = new Date().toLocaleTimeString('en-GB', {timeZone: tz});
        });
    }, 1000);
</script>
</body>
</html>
