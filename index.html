<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #333333; color: #FFFDD0; display: flex; margin: 0; padding: 20px; }
        
        /* الشريط الجانبي */
        .sidebar { width: 220px; padding: 20px; background: #212121; border-radius: 15px; margin-left: 20px; height: fit-content; }
        .sidebar a { display: block; color: #FFFDD0; text-decoration: none; margin-bottom: 20px; font-size: 1.1em; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .main-content { flex: 1; }
        
        .time-bar { display: flex; justify-content: space-around; background: #212121; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; color: #FFFDD0; }
        .time-box span { display: block; font-size: 1.2em; font-weight: bold; color: #f5e1a2; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* تصميم الآلة الحاسبة الموحد */
        .calc-screen { background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-family: 'Courier New', monospace; font-size: 1.5em; font-weight: bold; border: 2px inset #555; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .gold-market { background: #d4af37; color: black; } 
        .gold-calc { background: #2c3e50; } 
        .crypto { background: #27ae60; }
        .zakat { background: #c0392b; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: #E1C699; }
        th, td { padding: 10px; border: 1px solid rgba(0,0,0,0.3); text-align: center; color: black; }
        
        select, input { width: 100%; padding: 12px; border-radius: 5px; border: none; margin-bottom: 5px; color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="#">من نحن</a>
    <a href="#">سياسة الخصوصية</a>
    <a href="#">إخلاء المسؤولية</a>
    <a href="#">اتصل بنا</a>
</div>

<div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <a href="#"><img src="logo.png.png" alt="Logo" style="height: 140px; width: auto;"></a>
        <select id="lang" onchange="changeLanguage()" style="width:200px; color: black;">
            <option value="ar">🇸🇦 العربية</option><option value="en">🇺🇸 English</option>
            <option value="tr">🇹🇷 Türkçe</option><option value="uk">🇺🇦 Українська</option>
        </select>
    </div>

    <div class="time-bar">
        <div class="time-box"><span id="time-dubai">--:--:--</span></div>
        <div class="time-box"><span id="time-london">--:--:--</span></div>
        <div class="time-box"><span id="time-ny">--:--:--</span></div>
    </div>

    <div class="grid">
        <div class="card gold-market">
            <h2 data-i18n="gold_market">سوق الذهب دبي</h2>
            <table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>325.00</td><td>302.00</td><td>288.00</td><td>248.00</td></tr></table>
        </div>
        
        <div class="card gold-calc">
            <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
            <div class="calc-screen" id="finalPrice" style="color: #0f0;">0.00 AED</div>
            <div class="calc-grid">
                <select id="kSelect" onchange="calc()"><option value="24">24K</option><option value="22">22K</option><option value="21">21K</option><option value="18">18K</option></select>
                <input type="number" id="grams" value="1" placeholder="الوزن" oninput="calc()">
                <select id="labor" onchange="calc()"></select>
                <select id="tax" onchange="calc()"></select>
            </div>
        </div>

        <div class="card crypto">
            <h2 data-i18n="crypto_calc">حاسبة العملات الرقمية</h2>
            <div class="calc-screen" id="cryptoResult" style="color: #0f0;">0.00</div>
            <div class="calc-grid">
                <input type="number" id="cryptoAmount" placeholder="الكمية" oninput="calcCrypto()">
                <select id="cryptoSelect" onchange="calcCrypto()"></select>
                <select id="currencyTarget" onchange="calcCrypto()" style="grid-column: span 2;">
                    <option value="1">USD / USDT</option><option value="3.67">AED</option>
                    <option value="3.75">SAR</option><option value="0.92">EUR</option>
                </select>
            </div>
        </div>

        <div class="card zakat">
            <h2 data-i18n="zakat_calc">حاسبة زكاة الذهب</h2>
            <div class="calc-screen" id="zakatResult" style="color: #ff3333;">0.00</div>
            <div class="calc-grid">
                <select id="zakatKarat" onchange="calcZakat()"><option value="24">24K</option><option value="22">22K</option></select>
                <input type="number" id="zakatGrams" placeholder="الوزن بالجرام" oninput="calcZakat()">
            </div>
        </div>
    </div>
</div>

<script>
    // تعبئة الخيارات
    const labor = document.getElementById('labor');
    const tax = document.getElementById('tax');
    for(let i=0; i<=70; i+=5) labor.innerHTML += `<option value="${i/100}">مصنعية ${i}%</option>`;
    for(let i=0; i<=50; i+=5) tax.innerHTML += `<option value="${i/100}">ضريبة ${i}%</option>`;

    const cryptoData = [{name:"Bitcoin",val:65000},{name:"Ethereum",val:3500},{name:"USDT",val:1},{name:"XRP",val:0.5}];
    cryptoData.forEach(c => document.getElementById('cryptoSelect').innerHTML += `<option value="${c.val}">${c.name}</option>`);

    function calc() {
        let p = {'24':325, '22':302, '21':288, '18':248}[document.getElementById('kSelect').value];
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }
    function calcCrypto() {
        let res = (parseFloat(document.getElementById('cryptoAmount').value) || 0) * (parseFloat(document.getElementById('cryptoSelect').value) || 0) * (parseFloat(document.getElementById('currencyTarget').value) || 1);
        document.getElementById('cryptoResult').innerText = res.toFixed(2);
    }
    function calcZakat() {
        let p = (parseFloat(document.getElementById('zakatGrams').value) || 0) * (parseFloat(document.getElementById('zakatKarat').value) / 24);
        document.getElementById('zakatResult').innerText = (p >= 85 ? ((p * 325) * 0.025).toFixed(2) + " AED" : "لم يبلغ النصاب");
    }
    
    // تشغيل الساعات
    function updateClocks() {
        const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        document.getElementById('time-dubai').innerText = new Date().toLocaleTimeString('ar-AE', { ...opt, timeZone: 'Asia/Dubai' });
        document.getElementById('time-london').innerText = new Date().toLocaleTimeString('ar-AE', { ...opt, timeZone: 'Europe/London' });
        document.getElementById('time-ny').innerText = new Date().toLocaleTimeString('ar-AE', { ...opt, timeZone: 'America/New_York' });
    }
    setInterval(updateClocks, 1000);
    updateClocks();
</script>
</body>
</html>
