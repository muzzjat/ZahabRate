<script>
    // تهيئة القوائم
    const labor = document.getElementById('labor');
    const tax = document.getElementById('tax');
    for(let i=5; i<=50; i+=5) labor.innerHTML += `<option value="${i/100}">${i}%</option>`;
    
    // إضافة خيار الصفر للضريبة
    tax.innerHTML += `<option value="0">0%</option>`;
    for(let i=5; i<=25; i+=5) tax.innerHTML += `<option value="${i/100}">${i}%</option>`;

    // دالة لجلب الأسعار لحظياً (المرجع الأساسي)
    async function fetchLivePrices() {
        try {
            let resGold = await fetch('https://api.metals.live/v1/spot/gold');
            let dataGold = await resGold.json();
            let price24 = (dataGold[0].price / 31.1035) * 3.67 * 1.05; 
            
            // تحديث جدول الأسعار اللحظي
            document.getElementById('p24').innerText = price24.toFixed(2);
            document.getElementById('p22').innerText = (price24 * 22/24).toFixed(2);
            document.getElementById('p21').innerText = (price24 * 21/24).toFixed(2);
            document.getElementById('p18').innerText = (price24 * 18/24).toFixed(2);

            // تحديث العملات الرقمية
            let resCrypto = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,tether,binancecoin,dogecoin&vs_currencies=usd');
            let dataCrypto = await resCrypto.json();
            let select = document.getElementById('cryptoSelect');
            select.innerHTML = Object.keys(dataCrypto).map(c => 
                `<option value="${dataCrypto[c].usd}">${c.toUpperCase()}</option>`).join('');
            
            // إعادة الحساب فور تحديث الأسعار
            calc(); calcCrypto();
        } catch(err) { console.error("Error:", err); }
    }

    function calc() {
        // سحب السعر اللحظي المحدث من جدول الذهب
        let karatMap = {'24': 'p24', '22': 'p22', '21': 'p21', '18': 'p18'};
        let karat = document.getElementById('kSelect').value;
        let price = parseFloat(document.getElementById(karatMap[karat]).innerText);
        
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        
        // المعادلة مرتبطة الآن بالسعر المحدث لحظياً
        let total = (price * g) * (1 + l + t);
        document.getElementById('finalPrice').innerText = "الإجمالي: " + total.toFixed(2) + " AED";
    }

    function calcCrypto() {
        let amount = parseFloat(document.getElementById('cryptoAmount').value) || 0;
        let price = parseFloat(document.getElementById('cryptoSelect').value);
        document.getElementById('cryptoResult').innerText = "القيمة: " + (amount * price).toFixed(2) + " USD/USDT";
    }

    function changeLanguage() {
        let l = document.getElementById('lang').value;
        document.getElementById('htmlTag').dir = (l === 'ar') ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-ar]').forEach(el => el.innerText = el.getAttribute('data-' + l));
        let input = document.getElementById('cryptoAmount');
        input.placeholder = input.getAttribute('data-' + l + '-placeholder');
    }

    window.onload = () => { fetchLivePrices(); };
    setInterval(fetchLivePrices, 60000); 
</script>
