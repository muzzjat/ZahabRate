<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #333333; color: #FFFDD0; display: flex; margin: 0; padding: 20px; }
        .sidebar { width: 220px; padding: 20px; background: #212121; border-radius: 15px; margin-left: 20px; height: fit-content; }
        .sidebar a { display: block; color: #FFFDD0; text-decoration: none; margin-bottom: 20px; padding-bottom: 5px; border-bottom: 1px solid #444; cursor: pointer; }
        .main-content { flex: 1; }
        .time-bar { display: flex; justify-content: space-around; background: #212121; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; margin-bottom: 20px; }
        .gold-market { background: #d4af37; color: black; } 
        .gold-calc { background: #2c3e50; } 
        .zakat { background: #27ae60; }
        .crypto { background: #c0392b; }
        .calc-screen { background: #000; color: #0f0; padding: 10px; text-align: center; font-size: 1.4em; border-radius: 5px; margin-bottom: 10px; font-weight: bold; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: black; }
        th, td { border: 1px solid rgba(0,0,0,0.3); padding: 5px; text-align: center; background: #E1C699; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; }
        #modal { display:none; position:fixed; top:20%; right:30%; width:40%; background:#212121; padding:20px; border:1px solid #FFFDD0; z-index:100; }
    </style>
</head>
<body>

<div class="sidebar">
    <a onclick="showInfo('من نحن')">من نحن</a>
    <a onclick="showInfo('سياسة الخصوصية')">سياسة الخصوصية</a>
    <a onclick="showInfo('إخلاء المسؤولية')">إخلاء المسؤولية</a>
    <a onclick="showInfo('اتصل بنا')">اتصل بنا</a>
</div>

<div id="modal">
    <h3 id="modalTitle"></h3><p id="modalBody"></p>
    <button onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
</div>

<div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <img src="logo.png.png" style="height: 100px;">
        <select id="lang" onchange="changeLang()">
            <option value="ar">العربية</option><option value="en">English</option><option value="fr">Français</option>
            <option value="es">Español</option><option value="de">Deutsch</option><option value="it">Italiano</option>
            <option value="pt">Português</option><option value="ru">Русский</option><option value="zh">中文</option>
        </select>
    </div>

    <div class="time-bar">
        <div>دبي<span id="time-dubai" style="display:block;">--:--:--</span></div>
        <div>لندن<span id="time-london" style="display:block;">--:--:--</span></div>
        <div>نيويورك<span id="time-ny" style="display:block;">--:--:--</span></div>
    </div>

    <div class="grid">
        <div class="card gold-market">
            <h2 data-i18n="gold_market">أسعار الذهب تجزئة "دبى"</h2>
            <table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>325</td><td>302</td><td>288</td><td>248</td></tr></table>
        </div>
        
        <div class="card gold-calc">
            <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
            <div class="calc-screen" id="finalPrice">0.00 AED</div>
            <div class="calc-grid">
                <select id="kSelect" onchange="calc()"><option value="325">24K</option><option value="302">22K</option></select>
                <input type="number" id="grams" placeholder="الوزن" oninput="calc()">
                <select id="labor" onchange="calc()"></select><select id="tax" onchange="calc()"></select>
            </div>
        </div>

        <div class="card crypto">
            <h2 data-i18n="crypto_calc">حاسبة العملات الرقمية</h2>
            <div class="calc-screen" id="cryptoResult">0.00</div>
            <div class="calc-grid">
                <input type="number" id="cryptoAmount" oninput="calcCrypto()">
                <select id="cryptoSelect" onchange="calcCrypto()"></select>
                <select id="currencyTarget" onchange="calcCrypto()" style="grid-column:span 2;"><option value="1">USD</option><option value="3.67">AED</option></select>
            </div>
        </div>

        <div class="card zakat">
            <h2 data-i18n="zakat_calc">حاسبة زكاة الذهب</h2>
            <div class="calc-screen" id="zakatResult">0.00</div>
            <div class="calc-grid">
                <select id="zakatKarat" onchange="calcZakat()"><option value="24">24K</option></select>
                <input type="number" id="zakatGrams" oninput="calcZakat()">
            </div>
        </div>
    </div>
</div>

<script>
    const tr = {
        ar: { gold_market: 'أسعار الذهب تجزئة "دبى"', gold_calc: 'حاسبة الذهب', crypto_calc: 'حاسبة العملات الرقمية', zakat_calc: 'حاسبة زكاة الذهب' },
        en: { gold_market: 'Gold Price Retail "Dubai"', gold_calc: 'Gold Calculator', crypto_calc: 'Crypto Calculator', zakat_calc: 'Zakat Calculator' }
    };

    function changeLang() {
        const l = document.getElementById('lang').value;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            if(tr[l] && tr[l][el.dataset.i18n]) el.innerText = tr[l][el.dataset.i18n];
        });
    }

    function showInfo(t) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerText = "نص احترافي عن " + t;
        document.getElementById('modal').style.display = 'block';
    }

    // تعبئة البيانات
    const coins = [{name:"Bitcoin",val:65000}, {name:"Ethereum",val:3500}, {name:"USDT",val:1}, {name:"XRP",val:0.5}, {name:"Solana",val:150}, {name:"BNB",val:500}, {name:"Dogecoin",val:0.1}, {name:"Cardano",val:0.4}, {name:"Shiba",val:0.00002}, {name:"Avalanche",val:30}];
    coins.forEach(c => document.getElementById('cryptoSelect').innerHTML += `<option value="${c.val}">${c.name}</option>`);
    for(let i=0; i<=70; i+=5) document.getElementById('labor').innerHTML += `<option value="${i/100}">${i}% مصنعية</option>`;
    for(let i=0; i<=50; i+=5) document.getElementById('tax').innerHTML += `<option value="${i/100}">${i}% ضريبة</option>`;

    // الدوال
    function calc() {
        let p = parseFloat(document.getElementById('kSelect').value);
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }
    function calcCrypto() {
        let r = (parseFloat(document.getElementById('cryptoAmount').value) || 0) * (parseFloat(document.getElementById('cryptoSelect').value) || 0) * (parseFloat(document.getElementById('currencyTarget').value) || 1);
        document.getElementById('cryptoResult').innerText = r.toFixed(2);
    }
    function calcZakat() {
        let g = parseFloat(document.getElementById('zakatGrams').value) || 0;
        document.getElementById('zakatResult').innerText = g >= 85 ? ((g * 325) * 0.025).toFixed(2) + " AED" : "دون النصاب";
    }

    function updateClocks() {
        ['Asia/Dubai', 'Europe/London', 'America/New_York'].forEach((tz, i) => {
            document.querySelectorAll('.time-bar span')[i].innerText = new Date().toLocaleTimeString('ar-EG', {timeZone: tz});
        });
    }
    setInterval(updateClocks, 1000);
</script>
</body>
</html>
