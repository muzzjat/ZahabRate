<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE | Pro Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: #2c3e50; color: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; }
        th { background: #34495e; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; box-sizing: border-box; }
        .total-row { font-size: 22px; font-weight: bold; color: #d4af37; text-align: center; padding: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>حاسبة الذهب الاحترافية - Gold Calculator</h2>
    
    <table>
        <tr>
            <th>العيار</th>
            <th>الوزن (جرام)</th>
            <th>المصنعية %</th>
            <th>الضريبة %</th>
        </tr>
        <tr>
            <td>
                <select id="karat" onchange="calcGold()">
                    <option value="24">24</option>
                    <option value="22">22</option>
                    <option value="21" selected>21</option>
                    <option value="18">18</option>
                </select>
            </td>
            <td>
                <input type="number" id="grams" value="1" min="0.01" step="0.1" oninput="calcGold()">
            </td>
            <td>
                <select id="labor" onchange="calcGold()"></select>
            </td>
            <td>
                <select id="tax" onchange="calcGold()"></select>
            </td>
        </tr>
    </table>

    <div class="total-row" id="goldResult">الإجمالي: 0.00 AED</div>
</div>

<script>
    function initSelectors() {
        let laborSelect = document.getElementById('labor');
        for(let i=5; i<=50; i+=5) { laborSelect.innerHTML += `<option value="${i}">${i}%</option>`; }
        
        let taxSelect = document.getElementById('tax');
        for(let i=5; i<=25; i+=5) { taxSelect.innerHTML += `<option value="${i}">${i}%</option>`; }
    }

    function calcGold() {
        let g = parseFloat(document.getElementById('grams').value);
        // منع القيم السالبة
        if (g < 0) { document.getElementById('grams').value = 0; g = 0; }
        
        let k = parseInt(document.getElementById('karat').value);
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        
        let basePrice = (k / 24) * 300; 
        let rawPrice = g * basePrice;
        let withLabor = rawPrice + (rawPrice * (l / 100));
        let total = withLabor + (withLabor * (t / 100));
        
        document.getElementById('goldResult').innerText = "الإجمالي: " + total.toFixed(2) + " AED";
    }

    window.onload = function() {
        initSelectors();
        calcGold();
    };
</script>

</body>
</html>
