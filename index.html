<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* الألوان المميزة للجداول */
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .gold-calc { background: #2c3e50; } /* حاسبة الذهب */
        .live-gold { background: #d4af37; } /* سعر الذهب اللحظي */
        .crypto { background: #8e44ad; }    /* العملات الرقمية */
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: center; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="title">ZAHAB RATE</h1>
    <select id="lang" onchange="changeLanguage()" style="width: 150px;">
        <option value="ar">العربية (Arabic)</option>
        <option value="en">English</option>
    </select>
</div>

<div class="grid">
    <div class="card gold-calc">
        <h2 data-en="Gold Calculator" data-ar="حاسبة الذهب">حاسبة الذهب</h2>
        <table>
            <tr><th data-en="Karat" data-ar="العيار">العيار</th><th data-en="Weight" data-ar="الوزن">الوزن</th><th data-en="Labor" data-ar="المصنعية">المصنعية</th><th data-en="Tax" data-ar="الضريبة">الضريبة</th></tr>
            <tr>
                <td><select id="karat"><option>24</option><option>21</option></select></td>
                <td><input type="number" value="1"></td>
                <td><select id="labor"></select></td>
                <td><select id="tax"></select></td>
            </tr>
        </table>
        <h3 id="result">الإجمالي: 0.00 AED</h3>
    </div>

    <div class="card live-gold">
        <h2 data-en="Live Gold Rate" data-ar="سعر الذهب اللحظي">سعر الذهب اللحظي</h2>
        <table>
            <tr><th>24K</th><th>21K</th><th>18K</th></tr>
            <tr><td>310 AED</td><td>275 AED</td><td>235 AED</td></tr>
        </table>
    </div>

    <div class="card crypto">
        <h2 data-en="Crypto Market" data-ar="العملات الرقمية">العملات الرقمية</h2>
        <table>
            <tr><th>BTC</th><th>ETH</th><th>SOL</th></tr>
            <tr><td>60,000$</td><td>3,300$</td><td>145$</td></tr>
        </table>
    </div>
</div>

<script>
    function populate() {
        let l = document.getElementById('labor');
        for(let i=5; i<=50; i+=5) l.innerHTML += `<option>${i}%</option>`;
        let t = document.getElementById('tax');
        for(let i=5; i<=25; i+=5) t.innerHTML += `<option>${i}%</option>`;
    }

    function changeLanguage() {
        let lang = document.getElementById('lang').value;
        document.getElementById('htmlTag').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-ar]').forEach(el => {
            el.innerText = el.getAttribute('data-' + lang);
        });
    }

    window.onload = populate;
</script>
</body>
</html>
