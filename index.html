<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .gold-market { background: #d4af37; } .gold-calc { background: #2c3e50; } .crypto { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 5px; color: black; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h1 id="mainTitle">ZAHAB RATE</h1>
    <select id="lang" onchange="changeLanguage()" style="width:100px;">
        <option value="ar">العربية</option><option value="en">English</option>
    </select>
</div>

<div class="grid">
    <div class="card gold-market">
        <h2 data-ar="سوق الذهب دبي" data-en="Dubai Gold Market">سوق الذهب دبي</h2>
        <table>
            <tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr>
            <tr><td id="p24">325.00</td><td id="p22">302.00</td><td id="p21">288.00</td><td id="p18">248.00</td></tr>
        </table>
    </div>

    <div class="card gold-calc">
        <h2 data-ar="حاسبة الذهب" data-en="Gold Calculator">حاسبة الذهب</h2>
        <select id="kSelect" onchange="calc()"><option value="24">24K</option><option value="22">22K</option><option value="21">21K</option><option value="18">18K</option></select>
        <input type="number" id="grams" value="1" placeholder="الوزن" oninput="calc()">
        <select id="labor" onchange="calc()"><option value="0.05">مصنعية 5%</option><option value="0.10">10%</option></select>
        <select id="tax" onchange="calc()"><option value="0">ضريبة 0%</option><option value="0.05">5%</option></select>
        <h3 id="finalPrice">الإجمالي: 341.25 AED</h3>
    </div>

    <div class="card crypto">
        <h2 data-ar="حاسبة العملات الرقمية" data-en="Crypto Calculator">حاسبة العملات الرقمية</h2>
        <input type="number" id="cryptoAmount" placeholder="الكمية" oninput="calcCrypto()">
        <select id="cryptoSelect" onchange="calcCrypto()">
            <option value="65000">Bitcoin</option><option value="3500">Ethereum</option><option value="1">USDT</option>
        </select>
        <h3 id="cryptoResult">القيمة: 0.00 USD</h3>
    </div>
</div>

<script>
    function calc() {
        let prices = {'24':325, '22':302, '21':288, '18':248};
        let p = prices[document.getElementById('kSelect').value];
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = "الإجمالي: " + ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }

    function calcCrypto() {
        let a = parseFloat(document.getElementById('cryptoAmount').value) || 0;
        let p = parseFloat(document.getElementById('cryptoSelect').value) || 0;
        document.getElementById('cryptoResult').innerText = "القيمة: " + (a * p).toFixed(2) + " USD";
    }

    function changeLanguage() {
        let l = document.getElementById('lang').value;
        document.getElementById('htmlTag').dir = (l === 'ar') ? 'rtl' : 'ltr';
        // ترجمة العناوين المربوطة بـ data-ar/en
        document.querySelectorAll('[data-ar]').forEach(el => el.innerText = el.getAttribute('data-'+l));
    }
</script>
</body>
</html>
