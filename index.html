<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head><script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        <div id="google_translate_element"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
        body { font-family: sans-serif; background: #1a1a1a; padding: 20px; color: #FFFDD0; }
        .time-bar { display: flex; justify-content: space-around; background: #212121; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .time-box span { display: block; font-size: 1.2em; font-weight: bold; color: #f5e1a2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; margin-bottom: 20px; }
        .gold-market { background: #d4af37; color: black; } 
        .gold-calc { background: #2c3e50; } 
        .crypto { background: #c0392b; }
        .zakat { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { padding: 8px; border: 1px solid #333; text-align: center; color: black; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 5px; color: black; }
        /* تصميم شاشة الحاسبة */
        .calc-screen { background: #000; color: #0f0; padding: 15px; border-radius: 5px; text-align: center; font-family: monospace; font-size: 1.5em; margin-bottom: 10px; border: 2px inset #555; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <img src="logo.png.png" alt="Logo" style="height: 80px;">
    <select id="lang" onchange="changeLanguage()" style="width:200px; color: black;">
        <option value="ar">🇸🇦 العربية</option><option value="en">🇺🇸 English</option><option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option><option value="de">🇩🇪 Deutsch</option><option value="it">🇮🇹 Italiano</option>
        <option value="pt">🇵🇹 Português</option><option value="ru">🇷🇺 Русский</option><option value="zh">🇨🇳 中文</option>
        <option value="hi">🇮🇳 हिन्दी</option>
    </select>
</div>

<div class="time-bar">
    <div class="time-box"><span data-i18n="dubai">دبي</span><span id="time-dubai">--:--:--</span></div>
    <div class="time-box"><span data-i18n="london">لندن</span><span id="time-london">--:--:--</span></div>
    <div class="time-box"><span data-i18n="ny">نيويورك</span><span id="time-ny">--:--:--</span></div>
</div>

<div class="grid">
<div class="card gold-market">
    <h2 data-i18n="gold_market">أسعار الذهب المباشرة</h2>
    <iframe src="https://goldbroker.com/widget/live-price/XAU?currency=USD" width="100%" height="130" style="border: 0; overflow: hidden;"></iframe>
</div>
    <div class="card gold-calc">
        <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
        <div class="calc-screen" id="finalPrice">0.00 AED</div>
        <select id="kSelect" onchange="calc()"><option value="325">24K</option><option value="302">22K</option><option value="288">21K</option><option value="248">18K</option></select>
        <input type="number" id="grams" placeholder="الوزن" oninput="calc()">
        <select id="labor" onchange="calc()"></select><select id="tax" onchange="calc()"></select>
    </div>

    <div class="card crypto">
        <h2 data-i18n="crypto_calc">حاسبة العملات الرقمية</h2>
        <div class="calc-screen" id="cryptoResult">0.00</div>
        <input type="number" id="cryptoAmount" placeholder="عدد العملة" oninput="calcCrypto()">
        <select id="cryptoSelect" onchange="calcCrypto()"></select>
        <select id="currencyTarget" onchange="calcCrypto()">
            <option value="1">USD</option><option value="3.67">AED</option><option value="3.75">SAR</option><option value="0.92">EUR</option>
            <option value="48.5">EGP</option><option value="0.30">KWD</option><option value="0.38">OMR</option><option value="83.5">INR</option><option value="56.5">PHP</option>
        </select>
    </div>

    <div class="card zakat">
        <h2 data-i18n="zakat_calc">حاسبة زكاة الذهب</h2>
        <div class="calc-screen" id="zakatResult">0.00</div>
        <select id="zakatKarat" onchange="calcZakat()"><option value="24">24K</option><option value="22">22K</option></select>
        <input type="number" id="zakatGrams" placeholder="الوزن" oninput="calcZakat()">
    </div>
</div>

<script>
    // الدوال الاصلية كما هي
    function calc() {
        let p = parseFloat(document.getElementById('kSelect').value);
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }
    function calcCrypto() {
        let r = (parseFloat(document.getElementById('cryptoAmount').value) || 0) * (parseFloat(document.getElementById('cryptoSelect').value) || 0) * (parseFloat(document.getElementById('currencyTarget').value) || 1);
        document.getElementById('cryptoResult').innerText = r.toFixed(2);
    }
    function calcZakat() {
        let g = parseFloat(document.getElementById('zakatGrams').value) || 0;
        document.getElementById('zakatResult').innerText = g >= 85 ? ((g * 325) * 0.025).toFixed(2) + " AED" : "دون النصاب";
    }
    
    // الساعة
    function updateClocks() {
        const zones = ['Asia/Dubai', 'Europe/London', 'America/New_York'];
        const ids = ['time-dubai', 'time-london', 'time-ny'];
        zones.forEach((z, i) => document.getElementById(ids[i]).innerText = new Date().toLocaleTimeString('en-GB', {timeZone: z}));
    }
    setInterval(updateClocks, 1000);
    updateClocks();

    // تعبئة البيانات
    const cryptoData = [{n:"Bitcoin",v:65000},{n:"Ethereum",v:3500},{n:"USDT",v:1},{n:"XRP",v:0.5}];
    cryptoData.forEach(c => document.getElementById('cryptoSelect').innerHTML += `<option value="${c.v}">${c.n}</option>`);
    for(let i=0; i<=70; i+=5) document.getElementById('labor').innerHTML += `<option value="${i/100}">مصنعية ${i}%</option>`;
    for(let i=0; i<=50; i+=5) document.getElementById('tax').innerHTML += `<option value="${i/100}">ضريبة ${i}%</option>`;
</script>
</body>
</html>
