<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #FFFDD0; margin: 0; padding: 20px; padding-bottom: 150px; }
        .main-container { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); background: #2c3e50; }
        .gold-market { background: #d4af37; color: black; }
        .sidebar { background: #212121; padding: 20px; border-radius: 15px; border: 1px solid #d4af37; height: fit-content; }
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px 0; border-top: 2px solid #d4af37; text-align: center; z-index: 1000; }
        footer a { color: #d4af37; text-decoration: none; margin: 0 10px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; color: black; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <img src="logo.png.png" alt="Logo" style="height: 80px; width: auto;">
    <select id="lang" onchange="changeLanguage()" style="width:150px; cursor:pointer;">
        <option value="ar">العربية</option><option value="en">English</option>
        <option value="tl">Tagalog</option><option value="ur">اردو</option>
        <option value="hi">हिन्दी</option><option value="ta">தமிழ்</option>
        <option value="fr">Français</option>
    </select>
</div>

<div class="main-container">
    <div class="grid">
        <div class="card gold-market"><h2 id="t_gold">سوق الذهب دبي</h2><table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>501.75</td><td>464.50</td><td>445.50</td><td>381.75</td></tr></table></div>
        <div class="card"><h2 id="t_calc">حاسبة الذهب</h2><input type="number" id="grams" placeholder="الوزن" oninput="calc()"><select id="labor"></select><select id="tax"></select><h3 id="res_gold">الإجمالي: 0.00</h3></div>
        <div class="card"><h2 id="t_crypto">العملات الرقمية</h2><input type="number" id="cryptoAmount" placeholder="الكمية" oninput="calcCrypto()"><select id="cryptoSelect" onchange="calcCrypto()"></select><h3 id="res_crypto">القيمة: 0.00</h3></div>
        <div class="card"><h2 id="t_zakat">زكاة الذهب</h2><input type="number" id="zakatGrams" placeholder="الوزن" oninput="calcZakat()"><h3 id="res_zakat">الزكاة: 0.00</h3></div>
    </div>
    <div class="sidebar"><h3 id="t_contact">اتصل بنا</h3><p>muzzjat@gmail.com</p><p id="t_disclaimer" style="font-size: 0.8em; color: #aaa;">إخلاء مسؤولية: الأسعار استرشادية.</p></div>
</div>

<footer>
    <a href="#" id="t_about">من نحن</a> | <a href="#" id="t_privacy">سياسة الخصوصية</a> | <a href="mailto:muzzjat@gmail.com" id="t_contact_link">تواصل معنا ✉️</a>
</footer>

<script>
    const dict = {
        ar: {gold: "سوق الذهب دبي", calc: "حاسبة الذهب", crypto: "العملات الرقمية", zakat: "زكاة الذهب", weight: "الوزن", contact: "اتصل بنا", disc: "إخلاء مسؤولية: الأسعار استرشادية.", about: "من نحن", privacy: "سياسة الخصوصية", contact_link: "تواصل معنا"},
        en: {gold: "Dubai Gold Market", calc: "Gold Calculator", crypto: "Crypto Currency", zakat: "Gold Zakat", weight: "Weight", contact: "Contact Us", disc: "Disclaimer: Prices are approximate.", about: "About Us", privacy: "Privacy Policy", contact_link: "Contact Us"}
    };

    function changeLanguage() {
        let lang = document.getElementById('lang').value;
        let d = dict[lang] || dict['en'];
        document.getElementById('t_gold').innerText = d.gold;
        document.getElementById('t_calc').innerText = d.calc;
        document.getElementById('t_crypto').innerText = d.crypto;
        document.getElementById('t_zakat').innerText = d.zakat;
        document.getElementById('grams').placeholder = d.weight;
        document.getElementById('t_contact').innerText = d.contact;
        document.getElementById('t_disclaimer').innerText = d.disc;
        document.getElementById('t_about').innerText = d.about;
        document.getElementById('t_privacy').innerText = d.privacy;
        document.getElementById('t_contact_link').innerText = d.contact_link;
    }

    function calc() { /* دالة الحساب */ }
    function calcCrypto() { /* دالة العملات */ }
    function calcZakat() { /* دالة الزكاة */ }
    
    changeLanguage();
</script>
</body>
</html>
