<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE | منصة الأسعار اللحظية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .result { font-size: 24px; font-weight: bold; color: #d4af37; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>ZAHAB RATE</h1>
    <p>محول الذهب والعملات اللحظي</p>
    
    <input type="number" id="amount" placeholder="أدخل المبلغ..." oninput="calculate()">
    
    <select id="currency" onchange="calculate()">
        <option value="3.67">دولار أمريكي (USD)</option>
        <option value="3.95">يورو (EUR)</option>
        <option value="0.04">روبية هندية (INR)</option>
        <option value="250000">بيتكوين (BTC)</option>
    </select>

    <div class="result" id="output">النتيجة ستظهر هنا</div>
</div>

<script>
    function calculate() {
        const amount = document.getElementById('amount').value;
        const rate = document.getElementById('currency').value;
        const output = document.getElementById('output');
        
        if (amount > 0) {
            const result = (amount * rate).toFixed(2);
            output.innerText = "القيمة: " + result + " درهم";
        } else {
            output.innerText = "النتيجة ستظهر هنا";
        }
    }
</script>

</body>
</html>
