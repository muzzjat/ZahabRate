<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .gold-market { background: #d4af37; } .gold-calc { background: #2c3e50; } .crypto { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; margin-bottom: 5px; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h1 id="mainTitle">ZAHAB RATE</h1>
    <select id="lang" onchange="changeLanguage()">
        <option value="ar">العربية</option><option value="en">English</option>
    </select>
</div>

<div class="grid">
    <div class="card gold-market">
        <h2 data-ar="سوق الذهب دبي (Retail)" data-en="Dubai Gold Market (Retail)">سوق الذهب دبي (Retail)</h2>
        <table>
            <tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr>
            <tr><td id="p24">-</td><td id="p22">-</td><td id="p21">-</td><td id="p18">-</td></tr>
        </table>
    </div>

    <div class="card gold-calc">
        <h2 data-ar="حاسبة الذهب" data-en="Gold Calculator">حاسبة الذهب</h2>
        <table>
            <tr><th data-ar="العيار" data-en="Karat">العيار</th><th data-ar="الوزن" data-en="Weight">الوزن</th><th data-ar="المصنعية" data-en="Labor">المصنعية</th><th data-ar="الضريبة" data-en="Tax">الضريبة</th></tr>
            <tr>
                <td><select id="kSelect" oninput="calc()"><option value="24">24K</option><option value="22">22K</option><option value="21">21K</option><option value="18">18K</option></select></td>
                <td><input type="number" id="grams" value="1" oninput="calc()"></td>
                <td><select id="labor" oninput="calc()"></select></td>
                <td><select id="tax" oninput="calc()"></select></td>
            </tr>
        </table>
        <h3 id="finalPrice">الإجمالي: 0.00 AED</h3>
    </div>

    <div class="card crypto">
        <h2 data-ar="حاسبة العملات الرقمية" data-en="Crypto Calculator">حاسبة العملات الرقمية</h2>
        <input type="number" id="cryptoAmount" data-ar-placeholder="الكمية التي تملكها" data-en-placeholder="Amount you own" placeholder="الكمية التي تملكها" oninput="calcCrypto()">
        <select id="cryptoSelect" oninput="calcCrypto()"></select>
        <h3 id="cryptoResult">القيمة: 0.00 USD</h3>
    </div>
</div>

<script>
    // إعداد القوائم المنسدلة
    const labor = document.getElementById('labor');
    const tax = document.getElementById('tax');
    tax.innerHTML = '<option value="0">0%</option>';
    for(let i=5; i<=50; i+=5) labor.innerHTML += `<option value="${i/100}">${i}%</option>`;
    for(let i=5; i<=25; i+=5) tax.innerHTML += `<option value="${i/100}">${i}%</option>`;

    // جلب البيانات لحظياً
    async function updateData() {
        try {
            let resGold = await fetch('https://api.metals.live/v1/spot/gold');
            let dataG = await resGold.json();
            let p24 = (dataG[0].price / 31.1035) * 3.67 * 1.05;
            document.getElementById('p24').innerText = p24.toFixed(2);
            document.getElementById('p22').innerText = (p24 * 22/24).toFixed(2);
            document.getElementById('p21').innerText = (p24 * 21/24).toFixed(2);
            document.getElementById('p18').innerText = (p24 * 18/24).toFixed(2);

            let resCryp = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,tether,binancecoin,dogecoin&vs_currencies=usd');
            let dataC = await resCryp.json();
            document.getElementById('cryptoSelect').innerHTML = Object.keys(dataC).map(c => `<option value="${dataC[c].usd}">${c.toUpperCase()}</option>`).join('');
            calc(); calcCrypto();
        } catch(e) { console.error("Error loading data"); }
    }

    function calc() {
        let p = parseFloat(document.getElementById('p' + document.getElementById('kSelect').value).innerText) || 0;
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        document.getElementById('finalPrice').innerText = "الإجمالي: " + ((p * g) * (1 + l + t)).toFixed(2) + " AED";
    }

    function calcCrypto() {
        let a = parseFloat(document.getElementById('cryptoAmount').value) || 0;
        let p = parseFloat(document.getElementById('cryptoSelect').value) || 0;
        document.getElementById('cryptoResult').innerText = "القيمة: " + (a * p).toFixed(2) + " USD";
    }

    function changeLanguage() {
        let l = document.getElementById('lang').value;
        document.getElementById('htmlTag').dir = (l === 'ar') ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-ar]').forEach(el => el.innerText = el.getAttribute('data-' + l));
        document.getElementById('cryptoAmount').placeholder = document.getElementById('cryptoAmount').getAttribute('data-'+l+'-placeholder');
    }

    window.onload = updateData;
    setInterval(updateData, 60000);
</script>
</body>
</html>
