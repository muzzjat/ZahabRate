<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #333333; color: #FFFDD0; display: flex; margin: 0; padding: 20px; }
        .sidebar { width: 220px; padding: 20px; background: #212121; border-radius: 15px; margin-left: 20px; }
        .sidebar a { display: block; color: #FFFDD0; text-decoration: none; margin-bottom: 20px; border-bottom: 1px solid #444; cursor: pointer; }
        .main-content { flex: 1; }
        .time-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #212121; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 15px; border-radius: 15px; color: white; margin-bottom: 20px; }
        .gold-market { background: #d4af37; color: black; }
        .gold-calc { background: #2c3e50; }
        .zakat { background: #27ae60; }
        .crypto { background: #c0392b; }
        .calc-screen { background: #000; color: #0f0; padding: 10px; text-align: center; font-size: 1.3em; border-radius: 5px; margin-bottom: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <a data-i18n="about">من نحن</a>
    <a data-i18n="privacy">سياسة الخصوصية</a>
    <a data-i18n="disclaimer">إخلاء المسؤولية</a>
    <a data-i18n="contact">اتصل بنا</a>
</div>

<div class="main-content">
    <select id="lang" onchange="changeLang()">
        <option value="ar">🇸🇦 العربية</option><option value="en">🇺🇸 English</option><option value="fr">🇫🇷 Français</option>
        <option value="hi">🇮🇳 हिन्दी</option><option value="ru">🇷🇺 Русский</option><option value="ur">🇵🇰 اردو</option>
        <option value="tr">🇹🇷 Türkçe</option><option value="uk">🇺🇦 Українська</option><option value="es">🇪🇸 Español</option><option value="zh">🇨🇳 中文</option>
    </select>

    <div class="time-bar">
        <div><span data-i18n="dubai">دبي</span><span id="time-dubai">--:--:--</span></div>
        <div><span data-i18n="london">لندن</span><span id="time-london">--:--:--</span></div>
        <div><span data-i18n="ny">نيويورك</span><span id="time-ny">--:--:--</span></div>
    </div>

    <div class="grid">
        <div class="card gold-market">
            <h2 data-i18n="gold_market">أسعار الذهب</h2>
            <table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>325</td><td>302</td><td>288</td><td>248</td></tr></table>
        </div>
        
        <div class="card gold-calc">
            <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
            <div class="calc-screen" id="finalPrice">0.00</div>
            <select id="kSelect" onchange="calc()"><option value="325">24K</option><option value="302">22K</option><option value="288">21K</option></select>
            <input type="number" id="grams" data-i18n-placeholder="weight" placeholder="الوزن" oninput="calc()">
        </div>

        <div class="card crypto">
            <h2 data-i18n="crypto_calc">حاسبة العملات الرقمية</h2>
            <div class="calc-screen" id="cryptoResult">0.00</div>
            <input type="number" id="cryptoAmount" data-i18n-placeholder="coin_count" placeholder="عدد العملة" oninput="calcCrypto()">
            <select id="cryptoSelect" onchange="calcCrypto()"></select>
        </div>
    </div>
</div>

<script>
    const tr = {
        ar: { gold_market: 'أسعار الذهب', gold_calc: 'حاسبة الذهب', crypto_calc: 'حاسبة العملات', weight: 'الوزن', coin_count: 'عدد العملة', dubai: 'دبي', london: 'لندن', ny: 'نيويورك', about: 'من نحن', privacy: 'سياسة الخصوصية', disclaimer: 'إخلاء المسؤولية', contact: 'اتصل بنا' },
        en: { gold_market: 'Gold Price', gold_calc: 'Gold Calc', crypto_calc: 'Crypto Calc', weight: 'Weight', coin_count: 'Coin Count', dubai: 'Dubai', london: 'London', ny: 'New York', about: 'About', privacy: 'Privacy', disclaimer: 'Disclaimer', contact: 'Contact' }
        // (أضف باقي اللغات بنفس النسق هنا)
    };

    function changeLang() {
        const l = document.getElementById('lang').value;
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = tr[l][el.dataset.i18n] || el.innerText);
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = tr[l][el.dataset.i18n_placeholder] || el.placeholder);
        document.getElementById('htmlTag').dir = (l === 'ar' || l === 'ur') ? 'rtl' : 'ltr';
    }

    // إصلاح توقيت دبي والساعات
    function updateClocks() {
        const now = new Date();
        document.getElementById('time-dubai').innerText = now.toLocaleTimeString('en-GB', {timeZone: 'Asia/Dubai'});
        document.getElementById('time-london').innerText = now.toLocaleTimeString('en-GB', {timeZone: 'Europe/London'});
        document.getElementById('time-ny').innerText = now.toLocaleTimeString('en-GB', {timeZone: 'America/New_York'});
    }
    setInterval(updateClocks, 1000);
    updateClocks();

    function calc() {
        let p = parseFloat(document.getElementById('kSelect').value);
        let g = parseFloat(document.getElementById('grams').value) || 0;
        document.getElementById('finalPrice').innerText = (p * g).toFixed(2);
    }
    function calcCrypto() {
        let r = (parseFloat(document.getElementById('cryptoAmount').value) || 0) * (parseFloat(document.getElementById('cryptoSelect').value) || 1);
        document.getElementById('cryptoResult').innerText = r.toFixed(2);
    }
</script>
</body>
</html>
