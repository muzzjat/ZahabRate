<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE | Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* ألوان الفئات */
        .gold-market { background: #d4af37; } /* لون الذهب */
        .gold-calc { background: #2c3e50; }   /* لون حاسبة الذهب */
        .crypto { background: #8e44ad; }      /* لون العملات الرقمية */
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card gold-calc">
        <h2>حاسبة الذهب - Gold Calculator</h2>
        <input type="number" id="grams" placeholder="الوزن بالجرام (Grams)">
        <select id="karat">
            <option value="24">عيار 24</option>
            <option value="22">عيار 22</option>
            <option value="21">عيار 21</option>
            <option value="18">عيار 18</option>
        </select>
        <input type="number" id="labor" placeholder="المصنعية (Labor)">
        <input type="number" id="tax" placeholder="الضريبة % (Tax)">
        <button onclick="calculateGold()">احسب الإجمالي - Calculate</button>
        <h3 id="goldResult">الإجمالي: 0</h3>
    </div>

    <div class="card crypto">
        <h2>العملات الرقمية - Crypto</h2>
        <p>BTC: 60,000$ | ETH: 3,300$ | SOL: 140$ | XRP: 0.45$</p>
    </div>
</div>

<script>
    function calculateGold() {
        let grams = document.getElementById('grams').value;
        let karat = document.getElementById('karat').value;
        let labor = document.getElementById('labor').value;
        let tax = document.getElementById('tax').value;
        
        // معادلة مبسطة (يجب ربط سعر الجرام بـ API لاحقاً)
        let pricePerGram = (karat / 24) * 300; // سعر افتراضي
        let total = (grams * pricePerGram) + parseFloat(labor);
        total = total + (total * (tax / 100));
        
        document.getElementById('goldResult').innerText = "الإجمالي: " + total.toFixed(2) + " AED";
    }
</script>

</body>
</html>
