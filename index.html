<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a1a; color: #FFFDD0; margin: 0; padding: 100px 20px; }
        .header { position: fixed; top: 0; left: 0; width: 100%; background: #000; padding: 15px 20px; display: flex; justify-content: space-between; z-index: 1000; border-bottom: 2px solid #d4af37; }
        .time-bar { display: flex; justify-content: space-around; background: #212121; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .time-box span { display: block; font-size: 1.2em; font-weight: bold; color: #f5e1a2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; background: #2c3e50; }
        .gold-market { background: #d4af37; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 5px; color: black; height: 40px; }
        #articleContainer { font-size: 0.9em; max-height: 400px; overflow-y: auto; background: #1a1a1a; padding: 15px; border: 1px solid #444; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

<header class="header">
    <img src="logo.png.png" alt="Logo" style="height: 50px;">
    <select id="lang" onchange="changeLanguage()" style="width: 200px;">
        <option value="ar">🇸🇦 العربية</option>
        <option value="en">🇺🇸 English</option>
    </select>
</header>

<div class="time-bar">
    <div class="time-box"><span data-i18n="dubai">دبي</span><span id="time-dubai">--:--:--</span></div>
    <div class="time-box"><span data-i18n="london">لندن</span><span id="time-london">--:--:--</span></div>
    <div class="time-box"><span data-i18n="ny">نيويورك</span><span id="time-ny">--:--:--</span></div>
</div>

<div class="grid">
    <div class="card gold-market">
        <h2 data-i18n="gold_market">سوق الذهب دبي</h2>
        <table><tr><th>24K</th><th>22K</th><th>21K</th><th>18K</th></tr><tr><td>325.00</td><td>302.00</td><td>288.00</td><td>248.00</td></tr></table>
    </div>
    <div class="card">
        <h2 data-i18n="gold_calc">حاسبة الذهب</h2>
        <input type="number" id="grams" placeholder="أدخل وزن الذهب (جرام)" oninput="calc()">
        <h3 id="finalPrice" data-i18n="total">الإجمالي: 0.00 AED</h3>
    </div>
    <div class="card">
        <h2 data-i18n="article_title">دليلك الشامل للذهب</h2>
        <div id="articleContainer"></div>
    </div>
</div>

<script type="text/plain" id="article_ar">
دليلك الشامل للذهب: 
الذهب هو الملاذ الآمن الأول عبر التاريخ. 
عيار 24 هو الأنقى، وعيار 21 هو الأكثر شعبية في عالمنا العربي.
نصيحة: احرص دائماً على أخذ فاتورة رسمية عند الشراء.
</script>

<script type="text/plain" id="article_en">
Gold Guide Article:
Gold is the primary safe haven throughout history.
24K is the purest, while 21K is the most popular in the Arab world.
Tip: Always ensure you get an official invoice when purchasing.
</script>

<script>
    const uiData = {
        ar: { dubai: 'دبي', london: 'لندن', ny: 'نيويورك', gold_market: 'سوق الذهب دبي', gold_calc: 'حاسبة الذهب', total: 'الإجمالي: ', article_title: 'دليلك الشامل للذهب' },
        en: { dubai: 'Dubai', london: 'London', ny: 'New York', gold_market: 'Dubai Gold Market', gold_calc: 'Gold Calculator', total: 'Total: ', article_title: 'Gold Guide Article' }
    };

    function changeLanguage() {
        const l = document.getElementById('lang').value;
        const d = uiData[l];
        document.getElementById('htmlTag').dir = (l === 'ar' ? 'rtl' : 'ltr');
        
        // تحديث النصوص
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = d[el.getAttribute('data-i18n')]);
        
        // تحديث المقال من السكريبت المخفي
        document.getElementById('articleContainer').innerText = document.getElementById('article_' + l).textContent;
        
        calc();
    }

    function updateClocks() {
        const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        document.getElementById('time-dubai').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'Asia/Dubai' });
        document.getElementById('time-london').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'Europe/London' });
        document.getElementById('time-ny').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'America/New_York' });
    }

    function calc() {
        const l = document.getElementById('lang').value;
        let g = parseFloat(document.getElementById('grams').value) || 0;
        document.getElementById('finalPrice').innerText = uiData[l].total + (g * 325).toFixed(2) + " AED";
    }

    setInterval(updateClocks, 1000);
    updateClocks();
    changeLanguage(); // تشغيل أولي
</script>
</body>
</html>
