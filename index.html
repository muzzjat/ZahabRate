<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE Live</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .live-gold { background: #d4af37; }
        .crypto { background: #8e44ad; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card live-gold">
        <h2>أسعار الذهب اللحظية (USD)</h2>
        <p id="gold-price">جاري تحميل السعر...</p>
    </div>

    <div class="card crypto">
        <h2>العملات الرقمية (USD)</h2>
        <div id="crypto-prices">جاري تحميل الأسعار...</div>
    </div>
</div>

<script>
    // 1. جلب أسعار العملات الرقمية من CoinGecko
    async function fetchCrypto() {
        try {
            let res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,tether,binancecoin,dogecoin&vs_currencies=usd');
            let data = await res.json();
            let html = "<ul>";
            for(let coin in data) {
                html += `<li>${coin.toUpperCase()}: ${data[coin].usd}$</li>`;
            }
            html += "</ul>";
            document.getElementById('crypto-prices').innerHTML = html;
        } catch(e) { document.getElementById('crypto-prices').innerText = "خطأ في الاتصال"; }
    }

    // 2. جلب سعر الذهب (كمثال مبسط)
    // ملاحظة: أسعار الذهب تتطلب مفتاح API خاص، هذا السطر يوضح الفكرة فقط
    async function fetchGold() {
        document.getElementById('gold-price').innerText = "سعر الذهب العالمي: 2350$ للأونصة (تحديث لحظي)";
    }

    fetchCrypto();
    fetchGold();
    // التحديث كل 60 ثانية تلقائياً
    setInterval(fetchCrypto, 60000); 
</script>
</body>
</html>
