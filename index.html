<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAHAB RATE | Professional Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .gold-calc { background: #2c3e50; }
        .market-rate { background: #d4af37; }
        .crypto { background: #8e44ad; }
        
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; }
        .result-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; font-size: 20px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card gold-calc">
        <h2>حاسبة الذهب - Gold Calculator</h2>
        <input type="number" id="grams" placeholder="الوزن بالجرام (Grams)" oninput="calcGold()">
        
        <select id="karat" onchange="calcGold()">
            <option value="24">عيار 24</option>
            <option value="22">عيار 22</option>
            <option value="21">عيار 21</option>
            <option value="18">عيار 18</option>
        </select>

        <select id="labor" onchange="calcGold()">
            <option value="" disabled selected>اختر نسبة المصنعية %</option>
            </select>

        <select id="tax" onchange="calcGold()">
            <option value="" disabled selected>اختر نسبة الضريبة %</option>
            </select>

        <div class="result-box" id="goldResult">الإجمالي: 0.00 AED</div>
    </div>
</div>

<script>
    // توليد الأرقام للقوائم المنسدلة تلقائياً
    function populateSelects() {
        let laborSelect = document.getElementById('labor');
        for(let i=5; i<=50; i+=5) { laborSelect.innerHTML += `<option value="${i}">${i}%</option>`; }
        
        let taxSelect = document.getElementById('tax');
        for(let i=5; i<=25; i+=5) { taxSelect.innerHTML += `<option value="${i}">${i}%</option>`; }
    }

    function calcGold() {
        let g = parseFloat(document.getElementById('grams').value) || 0;
        let k = parseInt(document.getElementById('karat').value);
        let l = parseFloat(document.getElementById('labor').value) || 0;
        let t = parseFloat(document.getElementById('tax').value) || 0;
        
        let basePrice = (k / 24) * 300; // سعر تقريبي للجرام
        let rawPrice = g * basePrice;
        let withLabor = rawPrice + (rawPrice * (l / 100));
        let total = withLabor + (withLabor * (t / 100));
        
        document.getElementById('goldResult').innerText = "الإجمالي: " + total.toFixed(2) + " AED";
    }

    window.onload = populateSelects;
</script>

</body>
</html>
